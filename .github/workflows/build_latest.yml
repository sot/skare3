name: Conda build latest
on:
  push:
    branches:
    - master
    paths:
    - '**/ska3-*-latest/**'
    - '**/build_latest.yml'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: Build ska3-${{ matrix.pkg }}-latest (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-15-intel", "macos-latest", "windows-2022"]
        pkg: ["perl", "core", "flight"]
        exclude:
          - {os: windows-2022, pkg: perl}
          - {os: macos-15-intel, pkg: flight}
          - {os: macos-latest, pkg: flight}
          - {os: windows-2022, pkg: flight}
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - name: Fetch Skare3
      uses: actions/checkout@v4
      with:
        path: skare3
    - name: Fetch Skare3-tools
      uses: actions/checkout@v4
      with:
        repository: sot/skare3_tools
        ref: master
        path: skare3_tools
    - name: Setup Conda Environment
      uses: conda-incubator/setup-miniconda@v3.2.0
      with:
        auto-update-conda: true
        miniforge-version: latest
        python-version: "3.13"
        activate-environment: conda-build
        channels: conda-forge
    - name: Add flight channel
      run: conda config --env --add channels https://ska:${{ secrets.CONDA_PASSWORD }}@cxc.cfa.harvard.edu/mta/ASPECT/ska3-conda/flight
    - name: Temporarily use classic solver
      run: conda config --set solver classic
    - name: Update Conda Environment
      run: conda env update -n conda-build -f ./skare3/build-environment.yml
    - name: Install Conda Build in base environment
      # needed so the build command is actually found (same as build_release.yml)
      run: conda install -n base -c conda-forge conda-build
    - name: Build Package
      run: |
        os="${{ matrix.os }}"
        if [[ "${os:0:6}" == "ubuntu" ]]; then arch_flag=""; else arch_flag="--arch-specific"; fi
        python skare3_tools/skare3_tools/scripts/build.py ${arch_flag} ${PKG} \
          --tag ${GITHUB_SHA} --skare3-branch ${GITHUB_SHA}
      env:
        PKG: ska3-${{ matrix.pkg }}-latest
        CONDA_PASSWORD: ${{ secrets.CONDA_PASSWORD }}
        GIT_USERNAME: chandra-xray
        GIT_PASSWORD: ${{ secrets.CHANDRA_XRAY_TOKEN }}
        GIT_ASKPASS: ${{ github.workspace }}/skare3_tools/skare3_tools/scripts/git_pass.py
    - name: Save package
      uses: actions/upload-artifact@v4
      with:
        name: conda-package-${{ matrix.os }}-${{ matrix.pkg }}
        path: |
          builds/noarch/
          builds/linux-64/
          builds/osx-64/
          builds/osx-arm64/
          builds/win-64/
          !builds/*/*repodata*
          !builds/*/index.html

  update-channel:
    runs-on: head-linux
    name: Update Conda Channel
    needs: [build]
    steps:
      - name: Get packages
        uses: actions/download-artifact@v4.1.7
        with:
          pattern: conda-package-*
          merge-multiple: true
          path: package
      - name: Update channel
        run: |
          rsync -a package/ ${CONDA_CHANNEL_DIR}
          for d in noarch linux-64 osx-64 osx-arm64 win-64;
          do
            if [ -d "${CONDA_CHANNEL_DIR}/$d" ];
            then
              conda index ${CONDA_CHANNEL_DIR}/$d;
            fi
          done;
        env:
          CONDA_CHANNEL_DIR: /proj/sot/ska/www/ASPECT/ska3-conda/masters
